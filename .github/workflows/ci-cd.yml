name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker image
      run: |
        docker build -t taskmanager-image ./app

    - name: Save Docker image
      run: |
        docker save taskmanager-image | gzip > taskmanager-image.tar.gz

    - name: Copy image to EC2
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "taskmanager-image.tar.gz"
        target: "/home/ubuntu/"

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker load < /home/ubuntu/taskmanager-image.tar.gz
          docker rm -f taskmanager-app || true
          docker run -d \
            --name taskmanager-app \
            -p 80:5000 \
            -e DB_HOST=${{ secrets.DB_HOST }} \
            -e DB_NAME=taskdb \
            -e DB_USER=postgres \
            -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            taskmanager-image
          rm /home/ubuntu/taskmanager-image.tar.gz