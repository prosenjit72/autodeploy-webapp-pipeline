version: "3.8"

services:
  nginx:
    image: nginx:latest
    ports:
      - "5000:5000"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - app_network

  app:
    image: taskmanager-image
    volumes:
      - ./app/data:/app/data
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - app_network

networks:
  app_network:
    driver: bridge